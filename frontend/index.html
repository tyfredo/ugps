<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGPS - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light overflow-hidden"> 
    
    <div class="d-flex vh-100">
        
        <div class="sidebar d-flex flex-column flex-shrink-0 py-3 px-3 text-white bg-sidebar-dark" style="z-index: 10;">
            
            <a href="#" class="d-flex align-items-center mt-2 text-white text-decoration-none logo-wrapper">
                <img src="/frontend/assets/logoUGPS.png" alt="Logo UGPS" class="rounded-2 logo-img flex-shrink-0">
                <div class="logo-container ms-3">
                    <span class="logo-main-text">UGPS</span>
                    <span class="logo-sub-text">Bee Tracker</span>
                </div>
            </a>
            
            <hr class="border-secondary mb-4">
            
            <ul class="nav nav-pills flex-column mb-auto gap-2 w-100">
                <li class="nav-item">
                    <a href="#" class="nav-link active bg-ug-gold-dark text-dark fw-bold d-flex align-items-center" aria-current="page">
                        <i class="bi bi-truck fs-5 icon-center"></i> 
                        <span class="nav-text ms-3">Rutas Activas</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link text-white hover-nav d-flex align-items-center">
                        <i class="bi bi-clock-history fs-5 icon-center"></i> 
                        <span class="nav-text ms-3">Historial</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link text-white hover-nav d-flex align-items-center position-relative">
                        <i class="bi bi-bell fs-5 icon-center"></i> 
                        <span class="nav-text ms-3 d-flex justify-content-between align-items-center w-100">
                            Notificaciones 
                            <span class="badge bg-ug-gold-bright text-dark rounded-pill">3</span>
                        </span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link text-white hover-nav d-flex align-items-center">
                        <i class="bi bi-gear fs-5 icon-center"></i> 
                        <span class="nav-text ms-3">Configuración</span>
                    </a>
                </li>
            </ul>

            <div class="bottom-text text-center mt-auto py-2">
                <strong class="text-ug-gold-bright fs-6">Proyecto 2do Componente</strong>
            </div>
        </div>

        <div class="d-flex flex-column flex-grow-1 position-relative">
            <div id="mapa" class="w-100 h-100 z-1"></div>

            <div class="position-absolute bottom-0 start-0 m-4 z-3 floating-info-card">
                <div class="card border-ug-gold shadow-lg rounded-4" style="width: 340px;">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-dark">Detalles de Ruta</h5>
                            <button class="btn btn-sm btn-light border-0"><i class="bi bi-three-dots"></i></button>
                        </div>
                        <div class="mb-4">
                            <span class="badge bg-ug-gold-bright text-dark rounded-pill px-3 py-2 fw-bold shadow-sm">
                                <span class="spinner-grow spinner-grow-sm me-1" style="width: 0.5rem; height: 0.5rem;" role="status"></span>
                                En tránsito
                            </span>
                        </div>
                        <div class="timeline border-start border-ug-gold-desat border-2 ms-2 ps-3 py-1">
                            <div class="mb-3 position-relative">
                                <div class="position-absolute bg-ug-gold-desat rounded-circle" style="width: 10px; height: 10px; left: -22px; top: 5px;"></div>
                                <h6 class="fw-bold mb-0 text-dark">DICIS</h6>
                                <small class="text-muted">Punto de partida</small>
                            </div>
                            <div class="position-relative">
                                <div class="position-absolute bg-ug-blue-muted rounded-circle" style="width: 10px; height: 10px; left: -22px; top: 5px;"></div>
                                <h6 class="fw-bold mb-0 text-dark">ENMS Salamanca</h6>
                                <small class="text-muted">Destino actual</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
