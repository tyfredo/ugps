<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGPS - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light overflow-hidden"> 
    
    <div class="d-flex vh-100"> 
        
    <nav class="sidebar d-flex flex-column flex-shrink-0 py-4 px-3 text-white-50 bg-sidebar-dark" style="z-index: 10;">
        
        <a href="#" class="d-flex align-items-center mt-2 p-2 w-100 rounded-3 text-decoration-none bg-ug-hover transition-base overflow-hidden">
            <img src="/frontend/assets/logoUGPS.png" alt="Logo UGPS" class="rounded-3 logo-img flex-shrink-0" style="width: 55px; height: 55px; object-fit: cover;">
            <div class="logo-container ms-3 d-flex flex-column opacity-0 invisible transition-fade">
                <span class="logo-text fs-2 fw-black lh-1 text-ug-gold-bright">UGPS</span>
                <span class="fw-light text-white-50 text-uppercase" style="letter-spacing: 1.5px; font-size: 0.75rem;">Bee Tracker</span>
            </div>
        </a>
        
        <hr class="border-secondary my-4">
        
        <ul class="nav nav-pills flex-column mb-auto gap-3 w-100">
            <li class="nav-item">
                <a href="#" class="nav-link active text-ug-gold-bright fw-bold d-flex align-items-center p-3" aria-current="page">
                    <i class="bi bi-truck text-center"></i> 
                    <span class="nav-text ms-3 fs-5 opacity-0 invisible transition-fade">Rutas Activas</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white-50 hover-nav d-flex align-items-center p-3 transition-base">
                    <i class="bi bi-clock-history text-center"></i> 
                    <span class="nav-text ms-3 fs-5 opacity-0 invisible transition-fade">Historial</span>
                </a>
            </li>
            <li>
                <a href="#" class="nav-link text-white-50 hover-nav d-flex align-items-center p-3 transition-base">
                    <i class="bi bi-bell text-center"></i> 
                    <span class="nav-text ms-3 d-flex justify-content-between align-items-center w-100 fs-5 opacity-0 invisible transition-fade">
                        Notificaciones 
                        <span class="badge bg-ug-gold-bright text-dark rounded-pill fs-6">3</span>
                    </span>
                </a>
            </li>
        </ul>

        <div class="mt-auto pt-3">
            <a href="#" class="d-flex align-items-center p-2 w-100 rounded-3 text-decoration-none bg-ug-hover transition-base overflow-hidden">
                
                <img src="https://ui-avatars.com/api/?name=Guillermo+Gutierrez&background=f7db3c&color=1a1b1f" 
                    alt="Avatar" class="rounded-3 flex-shrink-0" 
                    style="width: 55px; height: 55px; object-fit: cover;">
                
                <div class="mx-3 d-flex align-items-center justify-content-between flex-grow-1 opacity-0 invisible transition-fade">
                    <div class="overflow-hidden">
                        <h6 class="mb-0 text-white fw-bold text-truncate" style="font-size: 0.9rem;">Guillermo G.</h6>
                        <small class="text-ug-gold-bright text-uppercase fw-light" style="font-size: 0.7rem; letter-spacing: 1.5px;">Alumno</small>
                    </div>

                    <div class="ms-2 btn-logout text-white-50 hover-gold">
                        <i class="bi bi-box-arrow-right fs-5"></i>
                    </div>
                </div>
            </a>
        </div>
    </nav>

        <main class="d-flex flex-column flex-grow-1 position-relative p-3 bg-sidebar-dark">
            <div id="mapa" class="w-100 h-100 rounded-4 shadow-lg overflow-hidden z-1"></div>

            <section class="position-absolute bottom-0 start-0 m-5 z-3">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="width: 340px;">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0 text-dark">Detalles de Ruta</h5>
                            <button class="btn btn-sm btn-light border-0"><i class="bi bi-three-dots"></i></button>
                        </div>
                        
                        <div class="mb-4">
                            <span class="badge bg-ug-gold-bright text-dark rounded-pill px-3 py-2 fw-bold shadow-sm">
                                <span class="spinner-grow spinner-grow-sm me-1" role="status"></span>
                                En tránsito
                            </span>
                        </div>

                        <div class="timeline border-start border-2 ms-2 ps-3 py-1" style="border-color: var(--ug-gold-bright) !important;">
                            <div class="mb-3 position-relative">
                                <div class="position-absolute bg-ug-gold-bright rounded-circle" style="width: 10px; height: 10px; left: -22px; top: 5px;"></div>
                                <h6 class="fw-bold mb-0 text-dark">DICIS</h6>
                                <small class="text-muted">Punto de partida</small>
                            </div>
                            <div class="position-relative">
                                <div class="position-absolute bg-ug-blue-muted rounded-circle" style="width: 10px; height: 10px; left: -22px; top: 5px;"></div>
                                <h6 class="fw-bold mb-0 text-dark">ENMS Salamanca</h6>
                                <small class="text-muted">Destino actual</small>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
    <script type="module" src="./js/firebase.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
